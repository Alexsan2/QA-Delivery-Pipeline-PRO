name: QA Delivery Pipeline E2E

on:
  push:
    branches: [ main ]

jobs:
  test-e2e:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout do Código
      uses: actions/checkout@v4

    - name: 🟢 Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: 📦 Instalar Selenium Atualizado
      run: npm install

    - name: 🕵️‍♂️ Rodar Testes (O Selenium Manager baixará o driver)
      run: node tests/checkout-test.js
