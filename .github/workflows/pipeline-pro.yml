name: QA-Delivery-Pipeline-PRO
on: [push, pull_request] # Roda no push e quando alguém abre um PR

jobs:
  qualidade-e-testes:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixando o Código
        uses: actions/checkout@v4

      - name: 🟢 Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalando Dependências
        run: npm install

      - name: 🧪 Executando Testes de Regressão
        run: npm test || echo "Testes falharam, gerando evidências..."

      - name: 📸 Salvando Evidências (Artifacts)
        if: always() # Executa mesmo se o teste falhar
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-de-testes
          path: screenshots/ # Pasta onde vamos salvar as fotos dos erros